<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Студия Анимации Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        /* Скролл разрешён везде, кроме холста */
        body {
            overscroll-behavior: none;
            touch-action: pan-x pan-y; /* НЕ none — иначе скролл не работает */
            background: #0f172a;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Холст перехватывает только своих touch */
        #main-canvas {
            touch-action: none;
            cursor: crosshair;
            border-radius: 12px;
            display: block;
        }

        /* Таймлайн скроллится горизонтально */
        #timeline-scroll {
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-x;
            display: flex;
            gap: 8px;
            padding: 4px 2px;
            align-items: center;
            flex: 1;
            scrollbar-width: none;
        }
        #timeline-scroll::-webkit-scrollbar { display: none; }

        .frame-thumb {
            width: 56px;
            height: 56px;
            border: 2px solid #475569;
            border-radius: 10px;
            overflow: hidden;
            flex-shrink: 0;
            cursor: pointer;
            transition: border-color 0.15s, transform 0.15s;
            background: #fff;
            position: relative;
        }
        .frame-thumb.active {
            border-color: #8b5cf6;
            transform: scale(1.08);
        }
        .frame-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }
        .frame-thumb .frame-num {
            position: absolute;
            bottom: 2px;
            right: 4px;
            font-size: 9px;
            color: #64748b;
            font-weight: 700;
            line-height: 1;
        }

        #btn-add-frame {
            width: 56px;
            height: 56px;
            border: 2px dashed #475569;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: #94a3b8;
            font-size: 22px;
            cursor: pointer;
            background: transparent;
            transition: border-color 0.15s, color 0.15s;
        }
        #btn-add-frame:active { border-color: #8b5cf6; color: #8b5cf6; }

        .tool-btn {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
            border: none;
            transition: background 0.1s;
        }
        .tool-btn.active { background: #7c3aed; }
        .tool-btn:not(.active) { background: #1e293b; }

        .checkerboard {
            background-image:
                linear-gradient(45deg, #cbd5e1 25%, transparent 25%),
                linear-gradient(-45deg, #cbd5e1 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #cbd5e1 75%),
                linear-gradient(-45deg, transparent 75%, #cbd5e1 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
            background-color: #e2e8f0;
        }

        .size-dot {
            border-radius: 50%;
            background: white;
            cursor: pointer;
            flex-shrink: 0;
        }
        .size-dot.selected { outline: 2px solid #8b5cf6; outline-offset: 2px; }
    </style>
</head>
<body>

    <!-- Шапка -->
    <header style="background:#0f172a; border-bottom:1px solid #1e293b; padding:10px 14px; display:flex; justify-content:space-between; align-items:center; flex-shrink:0;">
        <span style="font-size:13px; font-weight:700; color:#f1f5f9; letter-spacing:0.3px;">🎬 Студия Анимации</span>
        <div style="display:flex; gap:8px; align-items:center;">
            <button id="btn-play" style="background:#1e40af; color:#fff; border:none; padding:7px 14px; border-radius:8px; font-size:12px; font-weight:700; cursor:pointer;">▶ Играть</button>
            <button id="btn-export" style="background:#059669; color:#fff; border:none; padding:7px 14px; border-radius:8px; font-size:12px; font-weight:700; cursor:pointer;">📥 Экспорт</button>
        </div>
    </header>

    <!-- Панель инструментов -->
    <div style="background:#0f172a; border-bottom:1px solid #1e293b; padding:8px 14px; display:flex; gap:10px; align-items:center; flex-shrink:0; flex-wrap:wrap;">
        <div style="display:flex; gap:6px;">
            <button class="tool-btn active" id="tool-pen" title="Перо">✏️</button>
            <button class="tool-btn" id="tool-eraser" title="Ластик">🧹</button>
            <button class="tool-btn" id="tool-clear" title="Очистить кадр">🗑️</button>
        </div>
        <!-- Размер кисти -->
        <div style="display:flex; gap:8px; align-items:center; margin-left:4px;">
            <div class="size-dot selected" data-size="3" style="width:8px;height:8px;"></div>
            <div class="size-dot" data-size="8" style="width:14px;height:14px;"></div>
            <div class="size-dot" data-size="16" style="width:20px;height:20px;"></div>
            <div class="size-dot" data-size="30" style="width:28px;height:28px;"></div>
        </div>
        <!-- Цвет -->
        <input type="color" id="color-picker" value="#000000" style="width:36px;height:36px;border:none;border-radius:8px;cursor:pointer;padding:2px;background:#1e293b;">
        <!-- Луковая шкурка -->
        <label style="display:flex;align-items:center;gap:5px;font-size:11px;color:#94a3b8;cursor:pointer;">
            <input type="checkbox" id="onion-skin" style="cursor:pointer;"> Луковая шкурка
        </label>
        <!-- FPS -->
        <label style="display:flex;align-items:center;gap:5px;font-size:11px;color:#94a3b8;">
            FPS: <input type="number" id="fps-input" value="12" min="1" max="60" style="width:44px;padding:3px 5px;border-radius:6px;border:1px solid #334155;background:#1e293b;color:#f1f5f9;font-size:11px;">
        </label>
    </div>

    <!-- Холст -->
    <main style="flex:1; display:flex; align-items:center; justify-content:center; padding:12px; overflow:hidden; min-height:0;">
        <div class="checkerboard" style="border-radius:12px; display:inline-flex; max-width:100%; max-height:100%;">
            <canvas id="main-canvas"></canvas>
        </div>
    </main>

    <!-- Таймлайн -->
    <footer style="background:#0f172a; border-top:1px solid #1e293b; padding:10px 14px; display:flex; flex-direction:column; gap:6px; flex-shrink:0; height:96px;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="font-size:10px; color:#64748b; font-weight:600; letter-spacing:0.5px;">КАДРЫ</span>
            <span id="frame-counter" style="font-size:10px; color:#64748b;">1 / 1</span>
        </div>
        <div id="timeline-scroll">
            <button id="btn-add-frame">+</button>
        </div>
    </footer>

<script>
(function() {
    const canvas = document.getElementById('main-canvas');
    const ctx = canvas.getContext('2d');

    // Размер холста
    canvas.width = 800;
    canvas.height = 500;

    // Состояние
    let frames = [];          // массив dataURL строк (или null для пустого)
    let currentIdx = 0;
    let isDrawing = false;
    let tool = 'pen';         // 'pen' | 'eraser'
    let brushSize = 3;
    let color = '#000000';
    let onionEnabled = false;
    let fps = 12;
    let playInterval = null;

    // Инициализация первого кадра
    frames.push(null);
    renderTimeline();
    loadFrame(0);

    // ─── Рисование ───────────────────────────────────────────────────────────

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX, clientY;
        if (e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
        };
    }

    function startDraw(e) {
        e.preventDefault();
        isDrawing = true;
        const pos = getPos(e);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        // Точка при клике
        ctx.arc(pos.x, pos.y, (tool === 'eraser' ? brushSize * 2 : brushSize) / 2, 0, Math.PI * 2);
        ctx.fillStyle = tool === 'eraser' ? '#ffffff' : color;
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
    }

    function draw(e) {
        if (!isDrawing) return;
        e.preventDefault();
        const pos = getPos(e);
        ctx.lineTo(pos.x, pos.y);
        if (tool === 'eraser') {
            ctx.globalCompositeOperation = 'destination-out';
            ctx.strokeStyle = 'rgba(0,0,0,1)';
            ctx.lineWidth = brushSize * 3;
        } else {
            ctx.globalCompositeOperation = 'source-over';
            ctx.strokeStyle = color;
            ctx.lineWidth = brushSize;
        }
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
    }

    function endDraw(e) {
        if (!isDrawing) return;
        e.preventDefault();
        isDrawing = false;
        ctx.globalCompositeOperation = 'source-over';
        saveCurrentFrame();
        updateThumb(currentIdx);
    }

    // Mouse
    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('mouseleave', endDraw);

    // Touch
    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', endDraw, { passive: false });

    // ─── Кадры ───────────────────────────────────────────────────────────────

    function saveCurrentFrame() {
        frames[currentIdx] = canvas.toDataURL();
    }

    function loadFrame(idx) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.globalCompositeOperation = 'source-over';

        // Луковая шкурка — предыдущий кадр
        if (onionEnabled && idx > 0 && frames[idx - 1]) {
            const img = new Image();
            img.src = frames[idx - 1];
            img.onload = () => {
                ctx.save();
                ctx.globalAlpha = 0.25;
                ctx.drawImage(img, 0, 0);
                ctx.restore();
                // Поверх текущий
                if (frames[idx]) {
                    const cur = new Image();
                    cur.src = frames[idx];
                    cur.onload = () => ctx.drawImage(cur, 0, 0);
                }
            };
        } else if (frames[idx]) {
            const img = new Image();
            img.src = frames[idx];
            img.onload = () => ctx.drawImage(img, 0, 0);
        }

        currentIdx = idx;
        updateCounter();
        highlightActiveThumb();
    }

    function updateCounter() {
        document.getElementById('frame-counter').textContent = `${currentIdx + 1} / ${frames.length}`;
    }

    // ─── Таймлайн ────────────────────────────────────────────────────────────

    function renderTimeline() {
        const container = document.getElementById('timeline-scroll');
        // Убираем все превью (кроме кнопки добавления)
        const thumbs = container.querySelectorAll('.frame-thumb');
        thumbs.forEach(t => t.remove());

        const addBtn = document.getElementById('btn-add-frame');

        frames.forEach((frameData, i) => {
            const thumb = document.createElement('div');
            thumb.className = 'frame-thumb' + (i === currentIdx ? ' active' : '');
            thumb.dataset.idx = i;

            if (frameData) {
                const img = document.createElement('img');
                img.src = frameData;
                thumb.appendChild(img);
            } else {
                // Пустой кадр — белый
                thumb.style.background = '#fff';
            }

            const num = document.createElement('span');
            num.className = 'frame-num';
            num.textContent = i + 1;
            thumb.appendChild(num);

            thumb.addEventListener('pointerdown', (e) => {
                e.stopPropagation();
                saveCurrentFrame();
                updateThumb(currentIdx);
                loadFrame(i);
            });

            // Длинное нажатие — удалить кадр
            let pressTimer;
            thumb.addEventListener('pointerdown', () => {
                pressTimer = setTimeout(() => {
                    if (frames.length > 1) {
                        frames.splice(i, 1);
                        if (currentIdx >= frames.length) currentIdx = frames.length - 1;
                        renderTimeline();
                        loadFrame(currentIdx);
                    }
                }, 700);
            });
            thumb.addEventListener('pointerup', () => clearTimeout(pressTimer));
            thumb.addEventListener('pointermove', () => clearTimeout(pressTimer));

            container.insertBefore(thumb, addBtn);
        });

        updateCounter();
    }

    function updateThumb(idx) {
        const container = document.getElementById('timeline-scroll');
        const thumb = container.querySelector(`.frame-thumb[data-idx="${idx}"]`);
        if (!thumb) return;
        let img = thumb.querySelector('img');
        if (!img) {
            img = document.createElement('img');
            thumb.insertBefore(img, thumb.firstChild);
        }
        img.src = frames[idx] || '';
    }

    function highlightActiveThumb() {
        document.querySelectorAll('.frame-thumb').forEach((t, i) => {
            t.classList.toggle('active', parseInt(t.dataset.idx) === currentIdx);
        });
    }

    // Добавление кадра
    document.getElementById('btn-add-frame').addEventListener('pointerdown', (e) => {
        e.preventDefault();
        saveCurrentFrame();
        frames.splice(currentIdx + 1, 0, null); // вставить после текущего
        currentIdx = currentIdx + 1;
        renderTimeline();
        loadFrame(currentIdx);
    });

    // ─── Инструменты ─────────────────────────────────────────────────────────

    document.getElementById('tool-pen').addEventListener('click', () => {
        tool = 'pen';
        document.getElementById('tool-pen').classList.add('active');
        document.getElementById('tool-eraser').classList.remove('active');
    });

    document.getElementById('tool-eraser').addEventListener('click', () => {
        tool = 'eraser';
        document.getElementById('tool-eraser').classList.add('active');
        document.getElementById('tool-pen').classList.remove('active');
    });

    document.getElementById('tool-clear').addEventListener('click', () => {
        if (!confirm('Очистить текущий кадр?')) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        frames[currentIdx] = null;
        updateThumb(currentIdx);
        renderTimeline();
    });

    document.querySelectorAll('.size-dot').forEach(dot => {
        dot.addEventListener('click', () => {
            document.querySelectorAll('.size-dot').forEach(d => d.classList.remove('selected'));
            dot.classList.add('selected');
            brushSize = parseInt(dot.dataset.size);
        });
    });

    document.getElementById('color-picker').addEventListener('input', (e) => {
        color = e.target.value;
        tool = 'pen';
        document.getElementById('tool-pen').classList.add('active');
        document.getElementById('tool-eraser').classList.remove('active');
    });

    document.getElementById('onion-skin').addEventListener('change', (e) => {
        onionEnabled = e.target.checked;
        loadFrame(currentIdx);
    });

    document.getElementById('fps-input').addEventListener('change', (e) => {
        fps = Math.max(1, Math.min(60, parseInt(e.target.value) || 12));
        e.target.value = fps;
    });

    // ─── Воспроизведение ─────────────────────────────────────────────────────

    const btnPlay = document.getElementById('btn-play');
    btnPlay.addEventListener('click', () => {
        if (playInterval) {
            clearInterval(playInterval);
            playInterval = null;
            btnPlay.textContent = '▶ Играть';
            loadFrame(currentIdx);
            return;
        }
        saveCurrentFrame();
        let playIdx = 0;
        btnPlay.textContent = '⏹ Стоп';
        playInterval = setInterval(() => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (frames[playIdx]) {
                const img = new Image();
                img.src = frames[playIdx];
                img.onload = () => ctx.drawImage(img, 0, 0);
            }
            playIdx = (playIdx + 1) % frames.length;
        }, 1000 / fps);
    });

    // ─── Экспорт ─────────────────────────────────────────────────────────────

    document.getElementById('btn-export').addEventListener('click', async () => {
        saveCurrentFrame();

        // GIF-like: экспорт как WebM через MediaRecorder
        const offscreen = document.createElement('canvas');
        offscreen.width = canvas.width;
        offscreen.height = canvas.height;
        const offCtx = offscreen.getContext('2d');

        const stream = offscreen.captureStream(fps);
        const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
            ? 'video/webm;codecs=vp9'
            : 'video/webm';
        const recorder = new MediaRecorder(stream, { mimeType });
        const chunks = [];

        recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'animation.webm';
            a.click();
            setTimeout(() => URL.revokeObjectURL(url), 5000);
        };

        recorder.start();

        const frameDuration = 1000 / fps;
        for (const frameData of frames) {
            offCtx.clearRect(0, 0, offscreen.width, offscreen.height);
            offCtx.fillStyle = '#ffffff';
            offCtx.fillRect(0, 0, offscreen.width, offscreen.height);
            if (frameData) {
                await new Promise(res => {
                    const img = new Image();
                    img.onload = () => { offCtx.drawImage(img, 0, 0); res(); };
                    img.src = frameData;
                });
            }
            await new Promise(res => setTimeout(res, frameDuration));
        }

        recorder.stop();
    });

    // ─── Навигация клавишами ──────────────────────────────────────────────────

    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') {
            if (currentIdx < frames.length - 1) {
                saveCurrentFrame(); updateThumb(currentIdx); loadFrame(currentIdx + 1);
            }
        } else if (e.key === 'ArrowLeft') {
            if (currentIdx > 0) {
                saveCurrentFrame(); updateThumb(currentIdx); loadFrame(
