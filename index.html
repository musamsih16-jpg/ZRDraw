<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Студия Анимации Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/gh/antimatter15/whammy@master/whammy.min.js"></script>
    <style>
        body, html {
            overscroll-behavior-y: contain;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .checkerboard {
            background-image: 
                linear-gradient(45deg, #e2e8f0 25%, transparent 25%), 
                linear-gradient(-45deg, #e2e8f0 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #e2e8f0 75%), 
                linear-gradient(-45deg, transparent 75%, #e2e8f0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #f8fafc;
        }

        .frame-active {
            border-color: #8b5cf6 !important;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.3);
            transform: scale(1.05);
        }

        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(3deg); }
            50% { transform: rotate(0deg); }
            75% { transform: rotate(-3deg); }
            100% { transform: rotate(0deg); }
        }
        .deleting {
            animation: shake 0.2s ease-in-out infinite;
            filter: grayscale(100%) brightness(50%) sepia(100%) hue-rotate(-50deg) saturate(600%);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 h-screen w-screen flex flex-col font-sans overflow-hidden">

    <header class="bg-slate-900 border-b border-slate-800 p-3 flex items-center justify-between z-20 shrink-0 shadow-lg">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-violet-600 to-indigo-600 flex items-center justify-center shadow-lg shadow-violet-900/50">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
            </div>
            <div class="hidden sm:block">
                <h1 class="text-sm font-bold">Аниматор Pro</h1>
                <p class="text-[9px] text-slate-500">by Suno Technology Company (Founder: Musa Məsih)</p>
            </div>
        </div>

        <div class="flex items-center gap-2">
            <div class="flex items-center gap-2 bg-slate-950 p-1.5 rounded-xl border border-slate-800">
                <span class="text-xs text-slate-400 pl-2 hidden xs:inline">FPS:</span>
                <input type="number" id="fps-input" value="5" min="1" max="60" class="w-10 sm:w-12 bg-slate-800 text-white text-center rounded-lg py-1 text-sm outline-none focus:ring-2 focus:ring-violet-500">
                
                <button id="btn-play" class="bg-violet-600 hover:bg-violet-500 text-white px-3 sm:px-4 py-1.5 rounded-lg text-sm font-bold flex items-center gap-1 transition shadow-lg shadow-violet-900/50">
                    <span id="play-icon">▶️</span> <span id="play-text" class="hidden sm:inline">Пуск</span>
                </button>
            </div>
            
            <button id="btn-export" class="bg-emerald-600 hover:bg-emerald-500 text-white px-3 sm:px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-1 transition shadow-lg shadow-emerald-900/50">
                📥 <span class="hidden sm:inline">Экспорт</span>
            </button>
        </div>
    </header>

    <div class="bg-slate-900/50 border-b border-slate-800 p-2 flex items-center justify-start sm:justify-center gap-3 shrink-0 z-10 overflow-x-auto no-scrollbar">
        <input type="color" id="color-picker" value="#000000" class="w-8 h-8 rounded cursor-pointer bg-transparent border-0 shrink-0">
        
        <div class="flex items-center gap-2 shrink-0">
            <span class="text-xs text-slate-400">Кисть:</span>
            <input type="range" id="brush-size" min="1" max="40" value="5" class="w-20 sm:w-24 accent-violet-500 bg-slate-800 h-1.5 rounded-lg appearance-none cursor-pointer">
        </div>

        <div class="h-6 w-px bg-slate-800 shrink-0"></div>

        <button id="btn-eraser" class="px-3 py-1.5 rounded-lg text-xs font-semibold bg-slate-800 text-slate-300 hover:bg-slate-700 transition shrink-0">Ластик</button>
        <button id="btn-clear" class="px-3 py-1.5 rounded-lg text-xs font-semibold bg-red-950/40 text-red-400 hover:bg-red-900/50 transition shrink-0">Очистить</button>
        
        <div class="h-6 w-px bg-slate-800 shrink-0"></div>

        <label class="flex items-center gap-2 cursor-pointer shrink-0">
            <input type="checkbox" id="onion-skin-toggle" class="sr-only peer" checked>
            <div class="w-8 h-4 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-violet-500 relative"></div>
            <span class="text-xs text-slate-300 font-semibold hidden sm:inline">Калька</span>
        </label>
    </div>

    <main class="flex-1 w-full flex items-center justify-center p-2 sm:p-4 relative bg-slate-950">
        <div class="relative w-full max-w-2xl aspect-[4/3] rounded-xl overflow-hidden shadow-2xl border border-slate-700 checkerboard">
            <img id="onion-skin-layer" class="absolute inset-0 w-full h-full object-contain opacity-30 pointer-events-none hidden">
            <canvas id="main-canvas" class="absolute inset-0 w-full h-full touch-none cursor-crosshair"></canvas>
            
            <div id="status-overlay" class="absolute inset-0 bg-slate-950/80 hidden flex items-center justify-center flex-col pointer-events-auto z-50 backdrop-blur-sm">
                <div class="w-10 h-10 border-4 border-violet-500 border-t-transparent rounded-full animate-spin mb-3"></div>
                <span id="status-text" class="text-white font-bold tracking-wide">Рендеринг...</span>
            </div>
        </div>
    </main>

    <footer class="bg-slate-900 border-t border-slate-800 p-2 sm:p-3 shrink-0 h-32 flex flex-col z-20">
        <div class="flex justify-between items-center mb-2 shrink-0">
            <span class="text-xs font-bold text-slate-300" id="frame-counter">Кадр 1 из 1</span>
            <span class="text-[10px] text-slate-500 hidden sm:inline">Удержание кадра = Удалить | Удержание [+] = Дублировать</span>
        </div>
        
        <div class="flex-1 overflow-x-auto overflow-y-hidden no-scrollbar relative" id="timeline-scroll">
            <div class="flex gap-2 items-center h-16 w-max absolute top-0 left-0 px-2" id="frames-container">
                <button id="btn-add-frame" class="shrink-0 w-14 h-14 rounded-xl border-2 border-dashed border-slate-600 hover:border-violet-400 hover:bg-violet-500/10 text-slate-400 flex items-center justify-center transition flex-col relative select-none">
                    <svg class="w-6 h-6 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    <div id="hold-progress" class="absolute bottom-0 left-0 h-1 bg-violet-500 rounded-full w-0 transition-all duration-75"></div>
                </button>
            </div>
        </div>
    </footer>

    <div id="toast-container" class="fixed top-16 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none"></div>

<script>
    const canvas = document.getElementById('main-canvas');
    const ctx = canvas.getContext('2d');
    
    const CANVAS_WIDTH = 800;
    const CANVAS_HEIGHT = 600;
    canvas.width = CANVAS_WIDTH;
    canvas.height = CANVAS_HEIGHT;

    let frames = [];
    let currentFrameIndex = 0;
    
    let isDrawing = false;
    let isEraser = false;
    let currentColor = '#000000';
    let currentSize = 5;
    
    let isPlaying = false;
    let playInterval = null;

    const framesContainer = document.getElementById('frames-container');
    const btnAddFrame = document.getElementById('btn-add-frame');
    const fpsInput = document.getElementById('fps-input');
    const statusOverlay = document.getElementById('status-overlay');
    const statusText = document.getElementById('status-text');
    const btnPlay = document.getElementById('btn-play');
    const playIcon = document.getElementById('play-icon');
    const playText = document.getElementById('play-text');
    const btnExport = document.getElementById('btn-export');
    const colorPicker = document.getElementById('color-picker');
    const brushSize = document.getElementById('brush-size');
    const btnEraser = document.getElementById('btn-eraser');
    const btnClear = document.getElementById('btn-clear');

    function setupContext() {
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineWidth = currentSize;
    }
    setupContext();

    function getEmptyCanvasDataURL() {
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = CANVAS_WIDTH;
        tempCanvas.height = CANVAS_HEIGHT;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.fillStyle = '#ffffff'; // Исходный белый фон, чтобы не было прозрачности
        tempCtx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
        return tempCanvas.toDataURL('image/png');
    }

    frames.push(getEmptyCanvasDataURL());
    renderFramesList();
    loadFrameToCanvas(0);

    function loadFrameToCanvas(index) {
        currentFrameIndex = index;
        const img = new Image();
        img.onload = () => {
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            ctx.globalCompositeOperation = 'source-over';
            ctx.drawImage(img, 0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            updateUI();
        };
        img.src = frames[index];
    }

    function saveCurrentFrame() {
        frames[currentFrameIndex] = canvas.toDataURL('image/png');
        const thumbImg = document.getElementById(`thumb-img-${currentFrameIndex}`);
        if (thumbImg) thumbImg.src = frames[currentFrameIndex];
    }

    function updateUI() {
        document.getElementById('frame-counter').innerText = `Кадр ${currentFrameIndex + 1} из ${frames.length}`;
        document.querySelectorAll('.frame-thumb').forEach((el, idx) => {
            el.classList.toggle('frame-active', idx === currentFrameIndex);
        });

        const onionSkinToggle = document.getElementById('onion-skin-toggle');
        const onionLayer = document.getElementById('onion-skin-layer');
        if (onionSkinToggle.checked && currentFrameIndex > 0 && !isPlaying) {
            onionLayer.src = frames[currentFrameIndex - 1];
            onionLayer.classList.remove('hidden');
        } else {
            onionLayer.classList.add('hidden');
        }
    }

    function setupFrameLongPress(element, index) {
        let pressTimer;
        let isScrolling = false;

        const startHold = (e) => {
            if (e.touches && e.touches.length > 1) return;
            isScrolling = false;
            pressTimer = setTimeout(() => {
                if (!isScrolling) {
                    element.classList.add('deleting');
                    setTimeout(() => deleteFrame(index), 300);
                }
            }, 600);
        };

        const cancelHold = () => {
            clearTimeout(pressTimer);
            element.classList.remove('deleting');
        };

        element.addEventListener('touchstart', startHold, {passive: true});
        element.addEventListener('touchmove', () => { isScrolling = true; cancelHold(); }, {passive: true});
        element.addEventListener('touchend', cancelHold);
        
        element.addEventListener('mousedown', startHold);
        element.addEventListener('mousemove', () => cancelHold());
        element.addEventListener('mouseup', cancelHold);
        element.addEventListener('mouseleave', cancelHold);
    }

    function renderFramesList() {
        const thumbs = framesContainer.querySelectorAll('.frame-thumb-container');
        thumbs.forEach(t => t.remove());

        frames.forEach((frameData, index) => {
            const container = document.createElement('div');
            container.className = 'frame-thumb-container shrink-0 cursor-pointer relative group w-14 h-14';
            
            const thumb = document.createElement('div');
            thumb.className = `frame-thumb w-full h-full bg-white rounded-xl border-2 border-slate-700 overflow-hidden transition-all duration-200 checkerboard`;
            
            thumb.onclick = () => {
                if (isPlaying) togglePlay();
                saveCurrentFrame();
                loadFrameToCanvas(index);
            };

            const img = document.createElement('img');
            img.id = `thumb-img-${index}`;
            img.src = frameData;
            img.className = 'w-full h-full object-contain pointer-events-none';
            
            const numBadge = document.createElement('div');
            numBadge.className = 'absolute top-1 left-1 bg-black/70 text-white text-[9px] px-1 rounded font-mono pointer-events-none';
            numBadge.innerText = index + 1;

            thumb.appendChild(img);
            container.appendChild(thumb);
            container.appendChild(numBadge);
            
            setupFrameLongPress(container, index);
            framesContainer.insertBefore(container, btnAddFrame);
        });
        updateUI();
    }

    function deleteFrame(index) {
        if (frames.length <= 1) {
            showToast('Нельзя удалить последний кадр!');
            return;
        }
        frames.splice(index, 1);
        if (currentFrameIndex >= frames.length) currentFrameIndex = frames.length - 1;
        else if (currentFrameIndex > index) currentFrameIndex--;
        
        renderFramesList();
        loadFrameToCanvas(currentFrameIndex);
        showToast('🗑️ Кадр удален');
    }

    function addNewFrame() {
        saveCurrentFrame();
        frames.push(getEmptyCanvasDataURL());
        currentFrameIndex = frames.length - 1;
        renderFramesList();
        loadFrameToCanvas(currentFrameIndex);
        scrollToEnd();
    }

    function duplicateFrame() {
        saveCurrentFrame();
        frames.push(frames[currentFrameIndex]);
        currentFrameIndex = frames.length - 1;
        renderFramesList();
        loadFrameToCanvas(currentFrameIndex);
        scrollToEnd();
    }

    function scrollToEnd() {
        setTimeout(() => {
            document.getElementById('timeline-scroll').scrollTo({ left: 9999, behavior: 'smooth' });
        }, 50);
    }

    let addPressTimer;
    let holdProgressInterval;
    let isLongPressAdd = false;
    const holdProgressBar = document.getElementById('hold-progress');

    const startAddPress = (e) => {
        if (e.touches && e.touches.length > 1) return;
        isLongPressAdd = false;
        holdProgressBar.style.width = '0%';
        let startTime = Date.now();
        holdProgressInterval = setInterval(() => {
            let percent = Math.min(((Date.now() - startTime) / 500) * 100, 100);
            holdProgressBar.style.width = `${percent}%`;
        }, 20);

        addPressTimer = setTimeout(() => {
            isLongPressAdd = true;
            clearInterval(holdProgressInterval);
            holdProgressBar.style.width = '0%';
            duplicateFrame();
            showToast('📋 Кадр скопирован');
        }, 500);
    };

    const cancelAddPress = () => {
        clearTimeout(addPressTimer);
        clearInterval(holdProgressInterval);
        holdProgressBar.style.width = '0%';
    };

    const endAddPress = (e) => {
        if(e.cancelable) e.preventDefault();
        cancelAddPress();
        if (!isLongPressAdd) addNewFrame();
    };

    btnAddFrame.addEventListener('mousedown', startAddPress);
    btnAddFrame.addEventListener('touchstart', startAddPress, {passive: false});
    btnAddFrame.addEventListener('mouseup', endAddPress);
    btnAddFrame.addEventListener('touchend', endAddPress, {passive: false});
    btnAddFrame.addEventListener('mouseleave', cancelAddPress);
    btnAddFrame.addEventListener('touchcancel', cancelAddPress);

    function getCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX = e.clientX, clientY = e.clientY;
        if (e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX; clientY = e.touches[0].clientY;
        }
        return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
    }

    function startDrawing(e) {
        if (isPlaying) return;
        if(e.cancelable) e.preventDefault();
        isDrawing = true;
        setupContext();
        ctx.globalCompositeOperation = isEraser ? 'destination-out' : 'source-over';
        ctx.strokeStyle = isEraser ? 'rgba(0,0,0,1)' : currentColor;
        
        const coords = getCoords(e);
        ctx.beginPath();
        ctx.moveTo(coords.x, coords.y);
        ctx.lineTo(coords.x, coords.y);
        ctx.stroke();
    }

    function draw(e) {
        if (!isDrawing) return;
        if(e.cancelable) e.preventDefault();
        const coords = getCoords(e);
        ctx.lineTo(coords.x, coords.y);
        ctx.stroke();
    }

    function stopDrawing() {
        if (isDrawing) {
            isDrawing = false;
            saveCurrentFrame();
        }
    }

    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseleave', stopDrawing);

    canvas.addEventListener('touchstart', startDrawing, {passive: false});
    canvas.addEventListener('touchmove', draw, {passive: false});
    canvas.addEventListener('touchend', stopDrawing);

    colorPicker.addEventListener('input', (e) => {
        currentColor = e.target.value;
        isEraser = false;
        btnEraser.classList.remove('bg-violet-600', 'text-white');
        btnEraser.classList.add('bg-slate-800', 'text-slate-300');
    });

    brushSize.addEventListener('input', (e) => {
        currentSize = e.target.value;
    });

    btnEraser.addEventListener('click', () => {
        isEraser = !isEraser;
        btnEraser.classList.toggle('bg-violet-600', isEraser);
        btnEraser.classList.toggle('text-white', isEraser);
        btnEraser.classList.toggle('bg-slate-800', !isEraser);
        btnEraser.classList.toggle('text-slate-300', !isEraser);
    });

    btnClear.addEventListener('click', () => {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
        saveCurrentFrame();
    });

    function togglePlay() {
        if (isPlaying) {
            clearInterval(playInterval);
            isPlaying = false;
            playIcon.innerText = "▶️";
            playText.innerText = "Пуск";
            loadFrameToCanvas(currentFrameIndex);
        } else {
            saveCurrentFrame();
            isPlaying = true;
            playIcon.innerText = "⏸️";
            playText.innerText = "Стоп";
            let playIndex = currentFrameIndex;
            const fps = parseInt(fpsInput.
